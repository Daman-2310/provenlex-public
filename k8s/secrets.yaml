# Genesis Swarm — Secrets Template
#
# DO NOT commit actual secrets to git.
# Use this as a template; fill values in CI/CD or via your secret manager
# (Vault, AWS Secrets Manager, GCP Secret Manager, sealed-secrets).
#
# To create from CLI:
#   kubectl create secret generic genesis-secrets \
#     --namespace genesis \
#     --from-literal=GENESIS_JWT_SECRET='<strong-random-secret>' \
#     --from-literal=GENESIS_STRIPE_WEBHOOK_SECRET='whsec_...' \
#     --from-literal=GENESIS_STRIPE_PRICE_STARTER='price_...' \
#     --from-literal=GENESIS_STRIPE_PRICE_PROFESSIONAL='price_...' \
#     --from-literal=GENESIS_STRIPE_PRICE_ENTERPRISE='price_...' \
#     --from-literal=AISSTREAM_API_KEY='...' \
#     --from-literal=OPENSKY_USERNAME='...' \
#     --from-literal=OPENSKY_PASSWORD='...' \
#     --from-literal=GENESIS_OIDC_CLIENT_ID='...' \
#     --from-literal=GENESIS_OIDC_CLIENT_SECRET='...' \
#     --from-literal=REDIS_PASSWORD='...' \
#     --from-literal=GENESIS_REDIS_URL='redis://:your_password@genesis-redis:6379/0' \
#     --from-literal=ETHEREUM_PRIVATE_KEY=''
#
# Cert secret (generated by scripts/gen_pbft_certs.py):
#   kubectl create secret generic genesis-pbft-certs \
#     --namespace genesis \
#     --from-file=certs/
#
# IMPORTANT: The values below are PLACEHOLDER strings.
# Replace with real values before deploying.

apiVersion: v1
kind: Secret
metadata:
  name: genesis-secrets
  namespace: genesis
  labels:
    app.kubernetes.io/name: genesis-swarm
type: Opaque
stringData:
  GENESIS_JWT_SECRET:                "REPLACE_WITH_64_CHAR_RANDOM_SECRET"
  GENESIS_STRIPE_WEBHOOK_SECRET:     "whsec_REPLACE"
  GENESIS_STRIPE_PRICE_STARTER:      "price_REPLACE_STARTER"
  GENESIS_STRIPE_PRICE_PROFESSIONAL: "price_REPLACE_PROFESSIONAL"
  GENESIS_STRIPE_PRICE_ENTERPRISE:   "price_REPLACE_ENTERPRISE"
  AISSTREAM_API_KEY:                 "REPLACE"
  OPENSKY_USERNAME:                  "REPLACE"
  OPENSKY_PASSWORD:                  "REPLACE"
  GENESIS_OIDC_CLIENT_ID:            "REPLACE"
  GENESIS_OIDC_CLIENT_SECRET:        "REPLACE"
  REDIS_PASSWORD:                    "REPLACE_WITH_STRONG_PASSWORD"
  GENESIS_REDIS_URL:                 "redis://:REPLACE_WITH_STRONG_PASSWORD@genesis-redis:6379/0"
  ETHEREUM_PRIVATE_KEY:              ""

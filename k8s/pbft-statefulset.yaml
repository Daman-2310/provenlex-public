# Genesis Swarm — PBFT Consensus Cluster StatefulSet
#
# N=11, f=3 — tolerates up to 3 Byzantine-faulty or crashed replicas.
# PREPARE_QUORUM = COMMIT_QUORUM = 7 (2f+1).
#
# Each pod:
#   - Gets a stable identity: pbft-{i} (hostname, DNS, PVC)
#   - Derives its node ID and cert paths from the pod ordinal at runtime
#   - Mounts the shared cert bundle Secret and its own 5 GiB PVC for
#     Merkle tree state, audit SQLite, and PBFT log persistence
#
# PVC naming convention: pbft-data-pbft-{i}  (auto-created by volumeClaimTemplates)
#
# DNS of each peer inside the cluster (for GENESIS_PBFT_PEERS config):
#   pbft-{i}.pbft-headless.genesis.svc.cluster.local
#
# Pod Disruption Budget is defined in pod-disruption-budget.yaml:
#   maxUnavailable: 3  (never take down more than f nodes simultaneously)
#
# Certificate management:
#   All TLS and Ed25519 keys are stored in the "genesis-pbft-certs" Secret,
#   structured as pbft/replica-{i}/node.{key,crt} and signing.{key,pub}.
#   Generated by:  python scripts/gen_pbft_certs.py --nodes 11

---
# Headless Service — gives each pod a stable DNS name
apiVersion: v1
kind: Service
metadata:
  name: pbft-headless
  namespace: genesis
  labels:
    app.kubernetes.io/name: pbft
    app.kubernetes.io/component: consensus
spec:
  clusterIP: None       # headless — no VIP, direct pod DNS
  selector:
    app.kubernetes.io/name: pbft
  ports:
    - name: ws-consensus
      protocol: TCP
      port: 50050
      targetPort: ws-consensus
    - name: health
      protocol: TCP
      port: 8090
      targetPort: health

---
# StatefulSet — 11 PBFT replica pods
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pbft
  namespace: genesis
  labels:
    app.kubernetes.io/name: pbft
    app.kubernetes.io/component: consensus
    app.kubernetes.io/version: "0.5.0"
spec:
  serviceName: pbft-headless
  replicas: 11
  podManagementPolicy: Parallel     # all 11 pods start concurrently on deploy
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0                  # update all pods; set >0 for canary rollout
  selector:
    matchLabels:
      app.kubernetes.io/name: pbft
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pbft
        app.kubernetes.io/component: consensus
    spec:
      # ── Scheduling ──────────────────────────────────────────────────────────
      terminationGracePeriodSeconds: 60
      # Spread replicas across physical nodes — losing a physical node should
      # not take more than ~4 pods offline (f=3 limit).
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pbft
      # Prefer different availability zones when available
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: pbft
                topologyKey: topology.kubernetes.io/zone

      # ── Security context ─────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ── Init container: derive node ID from ordinal ──────────────────────────
      # StatefulSets set the pod hostname to "{statefulset-name}-{ordinal}".
      # We strip the prefix to get the zero-based ordinal, then write the
      # per-replica env vars into /run/genesis/env so the main container can
      # source them with `exec env $(cat /run/genesis/env) ...`.
      initContainers:
        - name: init-node-env
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          command: ["/bin/sh", "-c"]
          args:
            - |
              ORDINAL="${HOSTNAME##*-}"
              mkdir -p /run/genesis
              cat > /run/genesis/node.env << EOF
              GENESIS_PBFT_NODE_ID=replica-${ORDINAL}
              GENESIS_PBFT_BASE_PORT=$((50050 + ORDINAL))
              GENESIS_PBFT_TLS_CERT_PATH=/certs/pbft/replica-${ORDINAL}/node.crt
              GENESIS_PBFT_TLS_KEY_PATH=/certs/pbft/replica-${ORDINAL}/node.key
              GENESIS_PBFT_SIGNING_KEY_PATH=/certs/pbft/replica-${ORDINAL}/signing.key
              EOF
              echo "[init] pbft node env written for ordinal=${ORDINAL}"
          volumeMounts:
            - name: node-env
              mountPath: /run/genesis
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

      containers:
        - name: pbft-replica
          image: ghcr.io/daman-2310/genesis-swarm:v0.5.0   # replace with your registry
          imagePullPolicy: Always

          # ── Command: source per-node env then launch ─────────────────────────
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -a
              source /run/genesis/node.env
              set +a
              exec python -m genesis_swarm.consensus.grpc.pbft_entrypoint

          # ── Environment ──────────────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: genesis-config
            - secretRef:
                name: genesis-secrets
          env:
            # Downward API — pod identity for logging
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          # ── Ports ────────────────────────────────────────────────────────────
          ports:
            - name: ws-consensus
              containerPort: 50050  # base port; actual port = base + ordinal via env
              protocol: TCP
            - name: health
              containerPort: 8090
              protocol: TCP

          # ── Health probes ─────────────────────────────────────────────────────
          readinessProbe:
            tcpSocket:
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: health
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 4
          startupProbe:
            tcpSocket:
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # 12 × 5s = 60s startup budget

          # ── Resources ─────────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          # ── Security ──────────────────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]

          # ── Volume mounts ────────────────────────────────────────────────────
          volumeMounts:
            - name: pbft-data
              mountPath: /app/data
            - name: pbft-certs
              mountPath: /certs
              readOnly: true
            - name: node-env
              mountPath: /run/genesis

      volumes:
        - name: pbft-certs
          secret:
            secretName: genesis-pbft-certs
            defaultMode: 0400    # owner-read-only — private key protection
        - name: node-env
          emptyDir: {}

  # ── Persistent Volume Claims ─────────────────────────────────────────────────
  # One 5 GiB PVC per replica for Merkle tree state, PBFT log, audit SQLite.
  # PVCs survive pod restarts — deleted only when the StatefulSet is deleted
  # with --cascade=orphan or when manually removed.
  volumeClaimTemplates:
    - metadata:
        name: pbft-data
        labels:
          app.kubernetes.io/name: pbft
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd   # replace with your cluster's SSD StorageClass
        resources:
          requests:
            storage: 5Gi

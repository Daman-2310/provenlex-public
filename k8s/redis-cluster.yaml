# Genesis Swarm — Production Redis Cluster (6-node, 3M/3R)
#
# Architecture
# ─────────────────────────────────────────────────────────────────────────────
#   • StatefulSet: 6 pods (redis-cluster-{0..5})
#       pods 0-2 → elected as Masters by the bootstrap Job
#       pods 3-5 → assigned as Replicas (1 replica per master)
#   • Headless Service (redis-cluster-headless):
#       stable DNS per pod: redis-cluster-N.redis-cluster-headless.genesis.svc.cluster.local
#   • Client Service (redis-cluster):
#       ClusterIP, port 6379 — round-robin to all healthy nodes
#   • ConfigMap (redis-cluster-config):
#       redis.conf injected as a volume into every pod
#   • ConfigMap (redis-cluster-scripts):
#       bootstrap.sh — idempotent cluster-create Job script
#   • Job (redis-cluster-init):
#       runs once after StatefulSet pods reach Running state, forms the cluster
#   • PodDisruptionBudget:
#       maxUnavailable 1 — ensures cluster can tolerate maintenance
#
# Security hardening
# ─────────────────────────────────────────────────────────────────────────────
#   • runAsNonRoot / runAsUser 999 (redis group in Alpine)
#   • readOnlyRootFilesystem with /data mounted as writable emptyDir for AOF
#   • allowPrivilegeEscalation: false
#   • capabilities drop ALL
#   • podAntiAffinity — one pod per physical node (requiredDuringScheduling)
#   • resource requests/limits on every container
#   • Password auth via genesis-secrets (existing Secret in the namespace)
#   • PVC per pod — 4 Gi fast-ssd for AOF + RDB persistence
#
# Prerequisites
# ─────────────────────────────────────────────────────────────────────────────
#   kubectl -n genesis create secret generic genesis-secrets \
#       --from-literal=REDIS_PASSWORD=<strong-password>
#
# Deploy
# ─────────────────────────────────────────────────────────────────────────────
#   kubectl apply -f k8s/redis-cluster.yaml
#   # Wait for all 6 pods:
#   kubectl -n genesis rollout status statefulset/redis-cluster
#   # Bootstrap job runs automatically; check:
#   kubectl -n genesis logs job/redis-cluster-init -f

---
# ── ConfigMap: redis.conf ──────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: genesis-swarm
data:
  redis.conf: |
    # Cluster mode — mandatory fields
    cluster-enabled yes
    cluster-config-file /data/nodes.conf
    cluster-node-timeout 5000
    cluster-announce-hostname ""
    cluster-migration-barrier 1
    cluster-require-full-coverage yes
    cluster-slave-no-failover no

    # Persistence — AOF + RDB for durability
    appendonly yes
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    save 3600 1
    save 300 100
    save 60 10000
    dir /data

    # Memory
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    activerehashing yes

    # Security
    protected-mode no   # Network-level security handled by K8s NetworkPolicy
    requirepass ""       # Placeholder — actual password injected via --requirepass CLI arg
    rename-command FLUSHALL ""
    rename-command FLUSHDB  ""
    rename-command CONFIG   "GENESIS_CONFIG_e3f8a1"
    rename-command DEBUG    ""
    rename-command SLAVEOF  ""

    # Performance
    hz 20
    dynamic-hz yes
    lazyfree-lazy-eviction yes
    lazyfree-lazy-expire yes
    lazyfree-lazy-server-del yes
    replica-lazy-flush yes
    tcp-keepalive 300
    tcp-backlog 511
    loglevel notice
    latency-monitor-threshold 100

---
# ── ConfigMap: bootstrap script ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-scripts
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: scripts
    app.kubernetes.io/part-of: genesis-swarm
data:
  bootstrap.sh: |
    #!/bin/sh
    # Idempotent Redis Cluster bootstrap.
    # Runs inside a Job after the StatefulSet reaches Running state.
    # Exit codes: 0 = success (cluster formed or already exists), 1 = failure.
    set -euo pipefail

    NAMESPACE="${NAMESPACE:-genesis}"
    SVC="redis-cluster-headless.${NAMESPACE}.svc.cluster.local"
    REPLICAS=1
    CLUSTER_SIZE=6
    PASSWORD="${REDIS_PASSWORD}"

    log() { echo "[bootstrap] $*"; }

    # ── Wait for all pods to be reachable ─────────────────────────────────
    log "Waiting for all ${CLUSTER_SIZE} Redis nodes to accept connections..."
    for i in $(seq 0 $((CLUSTER_SIZE - 1))); do
      HOST="redis-cluster-${i}.${SVC}"
      RETRIES=0
      until redis-cli -h "${HOST}" -p 6379 -a "${PASSWORD}" --no-auth-warning PING 2>/dev/null | grep -q PONG; do
        RETRIES=$((RETRIES + 1))
        if [ "${RETRIES}" -gt 60 ]; then
          log "ERROR: redis-cluster-${i} did not respond after 60 retries"
          exit 1
        fi
        log "redis-cluster-${i} not ready yet (attempt ${RETRIES})..."
        sleep 5
      done
      log "redis-cluster-${i} is up"
    done

    # ── Check if the cluster is already initialised ────────────────────────
    CLUSTER_INFO=$(redis-cli -h "redis-cluster-0.${SVC}" -p 6379 -a "${PASSWORD}" \
                   --no-auth-warning CLUSTER INFO 2>/dev/null || echo "")
    if echo "${CLUSTER_INFO}" | grep -q "cluster_state:ok"; then
      log "Cluster is already formed and healthy — nothing to do."
      exit 0
    fi

    # ── Resolve IP addresses for all pods ─────────────────────────────────
    # redis-cli --cluster create requires IP:port pairs (not DNS names).
    log "Resolving pod IPs..."
    NODES=""
    for i in $(seq 0 $((CLUSTER_SIZE - 1))); do
      HOST="redis-cluster-${i}.${SVC}"
      IP=""
      RETRIES=0
      until [ -n "${IP}" ]; do
        IP=$(getent hosts "${HOST}" 2>/dev/null | awk '{print $1; exit}' || true)
        RETRIES=$((RETRIES + 1))
        if [ "${RETRIES}" -gt 30 ]; then
          log "ERROR: failed to resolve IP for ${HOST}"
          exit 1
        fi
        [ -z "${IP}" ] && sleep 2
      done
      log "Resolved ${HOST} -> ${IP}"
      NODES="${NODES} ${IP}:6379"
    done

    # ── Form the cluster ───────────────────────────────────────────────────
    log "Creating Redis Cluster (3 masters, 3 replicas)..."
    # shellcheck disable=SC2086
    redis-cli \
      -a "${PASSWORD}" \
      --no-auth-warning \
      --cluster create ${NODES} \
      --cluster-replicas "${REPLICAS}" \
      --cluster-yes

    log "Cluster formation complete."

    # ── Verify ────────────────────────────────────────────────────────────
    sleep 3
    FINAL_INFO=$(redis-cli -h "redis-cluster-0.${SVC}" -p 6379 \
                 -a "${PASSWORD}" --no-auth-warning CLUSTER INFO)
    echo "${FINAL_INFO}"
    if ! echo "${FINAL_INFO}" | grep -q "cluster_state:ok"; then
      log "ERROR: cluster did not reach 'ok' state after formation"
      exit 1
    fi

    MASTER_COUNT=$(redis-cli -h "redis-cluster-0.${SVC}" -p 6379 \
                  -a "${PASSWORD}" --no-auth-warning CLUSTER NODES \
                  | grep -c " master ")
    log "Cluster healthy — ${MASTER_COUNT} masters online."
    exit 0

---
# ── Headless Service — stable DNS per pod ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-headless
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: headless
    app.kubernetes.io/part-of: genesis-swarm
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
spec:
  type: ClusterIP
  clusterIP: None   # headless — enables per-pod DNS
  publishNotReadyAddresses: true   # needed during bootstrap so the Job can reach all pods
  selector:
    app.kubernetes.io/name: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
    - name: cluster-bus
      port: 16379
      targetPort: cluster-bus
      protocol: TCP

---
# ── Client Service — load-balanced read/write access ──────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: client
    app.kubernetes.io/part-of: genesis-swarm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis-cluster
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP

---
# ── StatefulSet — 6 pods (3 masters + 3 replicas) ─────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: genesis-swarm
    app.kubernetes.io/version: "7.2"
spec:
  serviceName: redis-cluster-headless
  replicas: 6
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-cluster
  podManagementPolicy: Parallel   # bring all 6 pods up simultaneously for faster bootstrap
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0   # update all pods; set to 5,4,3,... for canary rollouts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-cluster
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: genesis-swarm
      annotations:
        # Force pod restart when the ConfigMap changes
        checksum/config: "redis-cluster-config-v1"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9121"
    spec:
      # ── Security context (pod-level) ─────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 999    # redis user in alpine/redis image
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
        sysctls: []       # explicit: no kernel parameter overrides

      # ── Anti-affinity: one pod per physical node ──────────────────────────
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - redis-cluster
              topologyKey: kubernetes.io/hostname
              namespaces:
                - genesis

      # ── Topology spread (secondary constraint: spread across zones) ────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: redis-cluster

      # ── Init container: ensure /data has correct ownership ────────────────
      initContainers:
        - name: fix-permissions
          image: busybox:1.36.1
          command: ["sh", "-c", "chown -R 999:999 /data && chmod 750 /data"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data

      # ── Main container ────────────────────────────────────────────────────
      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command:
            - redis-server
          args:
            - /etc/redis/redis.conf
            - --requirepass
            - $(REDIS_PASSWORD)
            - --masterauth
            - $(REDIS_PASSWORD)
            - --cluster-announce-ip
            - $(POD_IP)

          # ── Environment ─────────────────────────────────────────────────
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genesis-secrets
                  key: REDIS_PASSWORD
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          # ── Ports ────────────────────────────────────────────────────────
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
            - name: cluster-bus
              containerPort: 16379
              protocol: TCP

          # ── Probes ───────────────────────────────────────────────────────
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24    # allow up to 120s for cold-start
            successThreshold: 1
            timeoutSeconds: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning ping
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "${REDIS_PASSWORD}" --no-auth-warning ping
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          # ── Resources ─────────────────────────────────────────────────────
          # Size based on 512 mb maxmemory + 20% headroom for overhead.
          resources:
            requests:
              cpu: "200m"
              memory: "640Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"

          # ── Security context (container-level) ───────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop: ["ALL"]

          # ── Volume mounts ────────────────────────────────────────────────
          volumeMounts:
            - name: redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
              readOnly: true
            - name: tmp
              mountPath: /tmp   # redis-cli needs /tmp for auth token on some versions

      # ── Redis Exporter sidecar (Prometheus metrics) ───────────────────────
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --redis.addr=redis://localhost:6379
            - --redis.password=$(REDIS_PASSWORD)
            - --web.listen-address=:9121
            - --web.telemetry-path=/metrics
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genesis-secrets
                  key: REDIS_PASSWORD
          ports:
            - name: metrics
              containerPort: 9121
              protocol: TCP
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 59000   # non-root, non-redis UID
            capabilities:
              drop: ["ALL"]

      # ── Shared volumes ────────────────────────────────────────────────────
      volumes:
        - name: redis-config
          configMap:
            name: redis-cluster-config
            defaultMode: 0440
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "16Mi"

      # ── Scheduling ─────────────────────────────────────────────────────────
      terminationGracePeriodSeconds: 60
      priorityClassName: ""   # set to "system-cluster-critical" in prod clusters

  # ── Persistent Volume Claim templates (one PVC per pod) ──────────────────
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          app.kubernetes.io/name: redis-cluster
          app.kubernetes.io/component: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 4Gi

---
# ── PodDisruptionBudget — at most 1 pod unavailable during maintenance ─────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-cluster-pdb
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/part-of: genesis-swarm
spec:
  # Redis Cluster requires a majority of masters (2 of 3) to remain available.
  # maxUnavailable: 1 guarantees this for both masters and replicas.
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-cluster

---
# ── ServiceAccount — minimal permissions for bootstrap Job ────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis-cluster-bootstrap
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: genesis-swarm
automountServiceAccountToken: false   # Job needs no K8s API access

---
# ── Job: cluster initialisation (runs once) ───────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: redis-cluster-init
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/component: init-job
    app.kubernetes.io/part-of: genesis-swarm
  annotations:
    # Re-run the job after upgrades by deleting it:
    #   kubectl -n genesis delete job redis-cluster-init
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900   # abort after 15 minutes — prevents infinite retry storms
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-cluster
        app.kubernetes.io/component: init-job
    spec:
      serviceAccountName: redis-cluster-bootstrap
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: bootstrap
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genesis-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bootstrap-scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: bootstrap-scripts
          configMap:
            name: redis-cluster-scripts
            defaultMode: 0550
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "8Mi"

---
# ── HorizontalPodAutoscaler — NOT applicable for Redis Cluster ────────────────
# Redis Cluster sharding is managed by cluster topology, not HPA replica count.
# Scaling a Redis Cluster requires explicit shard rebalancing (CLUSTER RESHARD).
# HPA is intentionally omitted to prevent accidental uncoordinated scale events.

---
# ── NetworkPolicy — restrict Redis traffic to genesis namespace ────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-cluster-network-policy
  namespace: genesis
  labels:
    app.kubernetes.io/name: redis-cluster
    app.kubernetes.io/part-of: genesis-swarm
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis-cluster
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow Redis client traffic from pods in the genesis namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: genesis
      ports:
        - protocol: TCP
          port: 6379

    # Allow cluster-bus gossip between Redis nodes
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis-cluster
      ports:
        - protocol: TCP
          port: 16379

    # Allow Prometheus scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9121

  egress:
    # Allow cluster-bus gossip outbound
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis-cluster
      ports:
        - protocol: TCP
          port: 16379
        - protocol: TCP
          port: 6379

    # Allow DNS resolution (CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

\ TLC Model Configuration for genesis_mesh.tla
\ Run: tlc -config genesis_mesh.cfg genesis_mesh.tla
\ Or:  java -jar tla2tools.jar -config genesis_mesh.cfg genesis_mesh.tla

SPECIFICATION Spec

\ -- INVARIANTS ---------------------------------------------------------------
INVARIANT MasterInvariant
INVARIANT ByzantineContainment
INVARIANT LeverageCompliance
INVARIANT Agreement
INVARIANT NoDeadlock

\ -- TEMPORAL PROPERTIES ------------------------------------------------------
PROPERTY Liveness
PROPERTY ProgressUnderAttack

\ -- MODEL CONSTANTS (small model for TLC tractability) -----------------------
\ N_AGENTS = 4: minimum to exhibit 1 Byzantine agent; 2f+1=3 quorum
\ BYZANTINE_COUNT = 1: f=1, satisfies 3f < N (3 < 4) -- BFT threshold
\ MAX_ROUND = 6: enough to observe multi-round and view-change behaviour
\ MAX_QUEUE = 8: bounded network buffer prevents infinite state explosion
CONSTANTS
    N_AGENTS       = 4
    MAX_ROUND      = 6
    MAX_QUEUE      = 8
    BYZANTINE_COUNT = 1
    AIFMD_GROSS_LIMIT = 30000
    AIFMD_NET_LIMIT   = 20000
    CONC_CAP          = 2000

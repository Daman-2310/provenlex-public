version: 2
updates:
  # ── Python dependencies ───────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      security-patches:
        patterns: ["*"]
        update-types: ["patch"]

  # ── Next.js / Node dependencies ───────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/jarvis-ui"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # ── Docker base images ────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

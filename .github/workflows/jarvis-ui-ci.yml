# =============================================================================
# GENESIS SWARM — JARVIS-UI CONTINUOUS INTEGRATION
# .github/workflows/jarvis-ui-ci.yml
#
# Runs on every push and pull_request affecting the jarvis-ui/ Next.js app.
# Typecheck → Test → Build → fail fast on any.
# =============================================================================

name: Jarvis-UI CI

on:
  push:
    branches: [main]
    paths:
      - 'jarvis-ui/**'
      - '.github/workflows/jarvis-ui-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'jarvis-ui/**'
      - '.github/workflows/jarvis-ui-ci.yml'

jobs:
  typecheck-test-build:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: jarvis-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: jarvis-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx next build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'placeholder-for-build' }}

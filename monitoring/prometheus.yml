global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: 'genesis-swarm'
    env: 'production'

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'genesis-api'
    static_configs:
      - targets: ['api:9091']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Genesis Swarm — JARVIS AI Compliance Evaluation Set
# Version: 1.0.0  |  Last updated: 2026-05-12
#
# 100 questions across 8 domains. Each question has:
#   - question: the prompt sent to JARVIS
#   - expected_keywords: substrings that MUST appear in a correct answer (case-insensitive)
#   - forbidden_keywords: substrings that MUST NOT appear (hallucination guards)
#   - domain: evaluation category
#   - difficulty: easy | medium | hard
#   - reference: regulatory source or internal component
#
# Scoring:
#   PASS  = all expected_keywords present AND no forbidden_keywords present
#   FAIL  = any expected_keyword missing OR any forbidden_keyword present
#   Target: ≥ 80 / 100 PASS

evals:

